name: Refract Cards
description: Refract's card styling on the default Stash theme - glass cards, hover glow, 3D tilt, rating-tier frames (Bronze to Perfect), and a playing-card performer layout. Configurable per card type.
version: 0.3.3
url: https://github.com/ordureconnoisseur/refract-cards
ui:
  assets:
    /: .
  javascript:
    - refract-cards.js
  css:
    - css/00_tokens.css
    - css/01_cards.css
    - css/02_playing_card.css
    - css/03_settings.css
settings:
  cards:
    displayName: Card styles
    description: "Refract Cards injects its configuration here (scene + performer card modes)."
    type: STRING
